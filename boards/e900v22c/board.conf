# Corebian 板级配置 —— e900v22c
MODEL="E900V22C"
SOC="s905l3a"              # Amlogic G12A
USERSPACE="Trixie"        # 用户空间代号(镜像命名用)
KVER="5.15.196"           # CoreELEC vendor 内核版本

# 板级二进制(本目录内)
AML_AUTOSCRIPT="aml_autoscript"   # CoreELEC 启动脚本(能在此盒触发 U 盘启动)
DTB="dtb.img"                     # vendor dtb (g12a_s905x2_2g)
CFGLOAD_TXT="cfgload.txt"         # bootm cfgload 模板

# 无线固化:开机自动加载的内核模块(out-of-tree, 由 blob 注入)
WIFIBT_MODULES="uwe5621_bsp_sdio sprdwl_ng sprdbt_tty"
# 蓝牙 hciattach 协议 / 波特率
BT_HCIATTACH_PROTO="sprd"
BT_HCIATTACH_SPEED="1500000"
BT_TTY="/dev/ttyBT0"

# eMMC 安装分区偏移(板级硬件特性, 单位 MiB) —— 供 corebian-install 用
EMMC_BLANK1="570"   # e900v22c/d: 前 570 MiB 不可写, boot 分区须从此开始
EMMC_BOOT="512"     # boot(FAT) 分区大小
EMMC_BLANK2="0"
